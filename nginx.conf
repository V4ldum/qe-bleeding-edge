server {
  listen 80;
  server_name localhost;

  location /live/ {
    alias /usr/share/nginx/html/;
    index index.html;
    try_files $uri $uri/ @live_fallback;
  }

  location @live_fallback {
    root /usr/share/nginx/html;
    try_files /index.html = 404;
  }

  location = / {
    return 301 /live/;
  }
}
